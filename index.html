<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Greetings, Marichewy 💫</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ffccd5, #ff4d6d);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1, h2, p {
      color: white;
      margin: 10px;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #yes {
      background-color: #28a745;
      color: white;
    }

    #no {
      background-color: #dc3545;
      color: white;
      position: relative;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h2>Greetings, Marichewy 🛸</h2>
  <h1>Official Twin Status Renewal 💫</h1>
  <p id="message">Pumktwin, will you continue being my certified Twin for 2026?</p>

  <div>
    <button id="yes">YES TWIN OR NOTHING 💖</button>
    <button id="no">I am no longer twin 😤</button>
  </div>

<script>
  let yesBtn = document.getElementById("yes");
  let noBtn = document.getElementById("no");
  let message = document.getElementById("message");

  let scale = 1;
  let noClicks = 0;

  const messages = [
    "Excuse me Twinasaur??? 🦖",
    "Twinamisu would NEVER say that.",
    "This violates Twin Code Section 3.",
    "Illegal twin activity detected 🚨",
    "System malfunction… twin rejection impossible.",
    "Okay but look at the YES button though 👀"
  ];

  noBtn.addEventListener("click", function() {
    noClicks++;
    scale += 0.35;
    yesBtn.style.transform = `scale(${scale})`;

    if (noClicks < messages.length) {
      message.textContent = messages[noClicks - 1];
    } else {
      message.textContent = "The system refuses to accept this decision 😈";
    }
  });

  yesBtn.addEventListener("click", function() {
    document.body.innerHTML = `
      <h1 style="color:white;">TWIN STATUS CONFIRMED 🎉</h1>
      <p style="color:white;">Forever Twin Mode Activated 💖</p>
      <p style="color:white;">Twinamisu Contract Successfully Renewed 📝✨</p>
    `;
    launchConfetti();
  });

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 25 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(createHeart, 300);

  function launchConfetti() {
    for (let i = 0; i < 120; i++) {
      let confetti = document.createElement("div");
      confetti.style.position = "absolute";
      confetti.style.width = "8px";
      confetti.style.height = "8px";
      confetti.style.background = "white";
      confetti.style.left = Math.random() * window.innerWidth + "px";
      confetti.style.top = Math.random() * window.innerHeight + "px";
      confetti.style.opacity = 1;
      document.body.appendChild(confetti);

      let fall = setInterval(() => {
        confetti.style.top = parseInt(confetti.style.top) + 6 + "px";
        confetti.style.opacity -= 0.02;
        if (confetti.style.opacity <= 0) {
          clearInterval(fall);
          confetti.remove();
        }
      }, 20);
    }
  }
</script>

</body>
</html>
