<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="view-transition" content="same-origin" />
  <title>Sam Collage</title>
  <meta name="description" content="Heart-shaped birthday collage for Sam." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="collage-page">
  <div class="bg-overlay"></div>

  <main class="page-shell collage-shell">
    <p class="eyebrow">For Sam, with chaos and love</p>
    <h1 class="hero-title">30 looks good on you</h1>
    <p class="tagline">A heart full of favorite moments.</p>

    <section class="heart-stage">
      <div class="heart-frame">
        <div id="photoGrid" class="photo-grid"></div>
      </div>
    </section>

    <section class="actions actions-collage">
      <a class="trust-btn secondary" href="index.html">Go back</a>

      <button
        id="luciferButton"
        class="lucifer-button"
        type="button"
        aria-label="Open Lucifer message"
        aria-expanded="false"
      >
        <img src="assets/lucifer.png" alt="Lucifer sticker" class="lucifer-img" />
      </button>

      <div id="luciferBubble" class="lucifer-bubble hidden" role="dialog" aria-live="polite">
        <p>
          Greetings Sam! It is I, Lucifer. I heard someone is turning 3 decades old
          (yikes), hope you enjoyed this website and wish you a very HAPPY BIRTHDAY!
        </p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
